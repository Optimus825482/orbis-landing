# ═══════════════════════════════════════════════════════════════
# ORBIS Landing — Mode B: HTTPS 443 (Cloudflare Proxy OFF)
# ═══════════════════════════════════════════════════════════════
#
# Use this config when Cloudflare Proxy is DISABLED (grey cloud).
# Origin terminates TLS using a Cloudflare Origin Certificate.
# CF SSL/TLS encryption mode MUST be set to "Full (Strict)".
#
# Required:
#   1. CF Dashboard → SSL/TLS → Origin Server → Create Certificate
#      (RSA 2048, 15-year validity)
#   2. Save cert → ./certs/origin.pem
#   3. Save key  → ./certs/origin.key
#   4. Add ./certs/ to .gitignore (already done)
#
# Mount via docker-compose.yaml (uncomment Mode B section):
#   ./nginx/cf-origin.conf:/etc/nginx/conf.d/default.conf:ro
#   ./certs/origin.pem:/etc/nginx/ssl/origin.pem:ro
#   ./certs/origin.key:/etc/nginx/ssl/origin.key:ro
#
# Docker image needs `EXPOSE 443` — for Mode B, override Dockerfile or
# use a Dockerfile variant.
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name orbisastro.online www.orbisastro.online;

    # ACME challenges for Let's Encrypt (if also using certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 443 with Cloudflare Origin Cert
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orbisastro.online www.orbisastro.online;

    # Cloudflare Origin Certificate (15-year RSA)
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — speeds up TLS handshake
    ssl_stapling on;
    ssl_stapling_verify on;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache headers
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Android App Links
    location /.well-known/assetlinks.json {
        default_type application/json;
        try_files $uri =404;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /blog/ {
        try_files $uri $uri/ $uri.html /blog/index.html;
    }

    location /legal/ {
        try_files $uri $uri/ $uri.html =404;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ═══════════════════════════════════════════════════════════
    # Security headers — full set in Mode B (CF edge yok)
    # ═══════════════════════════════════════════════════════════
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://www.google-analytics.com https://*.googlesyndication.com https://*.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://*.analytics.google.com https://*.googlesyndication.com; frame-src https://*.googlesyndication.com https://*.doubleclick.net https://googleads.g.doubleclick.net; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'self'; upgrade-insecure-requests" always;
}
