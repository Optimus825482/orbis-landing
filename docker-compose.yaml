# ═══════════════════════════════════════════════════════════════
# ORBIS Landing — Coolify Docker Compose
# Domain: orbisastro.online
# Default: Mode A (Cloudflare Proxy ON, HTTP 80)
# ═══════════════════════════════════════════════════════════════
#
# Coolify setup:
#   1. New Resource → Application → "Docker Compose"
#   2. Source: Git repo, branch main
#   3. Build Pack: Dockerfile
#   4. Port Exposes: 80
#   5. Healthcheck path: /health
#   6. Env: copy from .env.example
#   7. Deploy
#
# Mode B (CF Proxy OFF + Origin Cert): see nginx-configs.md
# ═══════════════════════════════════════════════════════════════

services:
  orbis-landing:
    container_name: ${CONTAINER_NAME:-orbis-landing}
    build:
      context: .
      dockerfile: Dockerfile
    image: orbis-landing:latest
    restart: unless-stopped

    # Coolify injects reverse proxy — expose only, do NOT use `ports:`
    expose:
      - "80"

    labels:
      - "coolify.managed=true"
      - "coolify.type=application"

    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - DOMAIN=${DOMAIN:-orbisastro.online}

    volumes:
      # Mode A: HTTP-only nginx config (CF edge emits HSTS)
      # Files at repo root — Coolify mount compatibility
      - ./nginx-http.conf:/etc/nginx/conf.d/default.conf:ro

      # Mode B (uncomment + provision Cloudflare Origin Cert at ./certs/):
      # - ./nginx-cf-origin.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certs/origin.pem:/etc/nginx/ssl/origin.pem:ro
      # - ./certs/origin.key:/etc/nginx/ssl/origin.key:ro

    networks:
      - orbis-net

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Resource limits (tune for your VPS)
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 100

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    stop_grace_period: 10s

networks:
  orbis-net:
    name: orbis-net
    driver: bridge
